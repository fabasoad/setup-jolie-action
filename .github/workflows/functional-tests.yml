---
name: Functional Tests

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/functional-tests.yml
      - src/**
      - action.yml
  schedule:
    # Every Friday at 09:00 JST
    - cron: "0 0 * * 5"
  workflow_dispatch: {}

defaults:
  run:
    shell: sh

jobs:
  get-jolie-versions:
    name: Get 3 latest jolie versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    outputs:
      versions: ${{ steps.prepare-list.outputs.versions }}
    steps:
      - name: Get releases
        id: github-releases
        uses: yakubique/github-releases@2827d6f627dc289b8cbbc9b4d030956d67c37c68 # v1.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          repository: "jolie/jolie"
          sort: "desc"
      - name: Prepare list
        id: prepare-list
        env:
          RELEASES_AMOUNT: "3"
          RELEASES: "${{ steps.github-releases.outputs.releases }}"
        run: |
          versions=$(echo "${RELEASES}" \
            | jq -c -r --arg n "${RELEASES_AMOUNT}" '.[0:($n | tonumber)] | map(sub("^v"; "")) | . += ["latest"]')
          echo "versions=${versions}" >> "$GITHUB_OUTPUT"
  setup-jolie:
    name: Setup jolie
    needs: [get-jolie-versions]
    runs-on: ${{ matrix.os }}-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu", "windows", "macos"]
        jolie-version: ${{ fromJSON(needs.get-jolie-versions.outputs.versions) }}
    steps:
      - name: Clean up lingering sockets (Windows)
        if: runner.os == 'Windows'
        run: |
          # Close any processes holding ports 10101, 10102, etc.
          Get-NetTCPConnection -LocalPort 10101 -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Get-NetTCPConnection -LocalPort 10102 -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2
        shell: pwsh
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v7
        with:
          persist-credentials: "false"
      - name: Setup jolie
        id: setup-jolie
        uses: ./
        with:
          jolie-version: ${{ matrix.jolie-version }}
          jpm-installation-mode: "skip"
      - name: Test action completion
        env:
          SETUP_JOLIE_OUTPUT_JOLIE_INSTALLED: "${{ steps.setup-jolie.outputs.jolie-installed }}"
          SETUP_JOLIE_OUTPUT_JPM_INSTALLED: "${{ steps.setup-jolie.outputs.jpm-installed }}"
        run: |
          test_equal() {
            if [ "${2}" != "${3}" ]; then
              echo "::error title=${1}::Expected: ${3}. Actual: ${2}."
              exit 1
            fi
          }
          test_equal "jolie should be installed" \
            "${SETUP_JOLIE_OUTPUT_JOLIE_INSTALLED}" \
            "true"
          test_equal "jpm should not be installed" \
            "${SETUP_JOLIE_OUTPUT_JPM_INSTALLED}" \
            "false"
      - name: Print version
        run: jolie --version
  get-jpm-versions:
    name: Get 3 latest jpm versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    outputs:
      versions: ${{ steps.prepare-list.outputs.versions }}
    steps:
      - name: Prepare list
        id: prepare-list
        env:
          RELEASES_AMOUNT: "3"
          TARGET_REPO: "jolie/jpm"
        run: |
          versions=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${TARGET_REPO}/tags" \
            | jq -c -r --arg n "${RELEASES_AMOUNT}" '[.[0:($n | tonumber)][].name] | map(sub("^v"; "")) | . += ["latest"]')
          echo "versions=${versions}" >> "$GITHUB_OUTPUT"
  setup-jpm:
    name: Setup jpm
    needs: [get-jpm-versions]
    runs-on: ${{ matrix.os }}-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu", "windows", "macos"]
        jpm-version: ${{ fromJSON(needs.get-jpm-versions.outputs.versions) }}
    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v7
        with:
          persist-credentials: "false"
      - name: Setup jolie
        id: setup-jolie
        uses: ./
        with:
          jpm-version: ${{ matrix.jpm-version }}
          jolie-installation-mode: "skip"
      - name: Test action completion
        env:
          SETUP_JOLIE_OUTPUT_JOLIE_INSTALLED: "${{ steps.setup-jolie.outputs.jolie-installed }}"
          SETUP_JOLIE_OUTPUT_JPM_INSTALLED: "${{ steps.setup-jolie.outputs.jpm-installed }}"
        run: |
          test_equal() {
            if [ "${2}" != "${3}" ]; then
              echo "::error title=${1}::Expected: ${3}. Actual: ${2}."
              exit 1
            fi
          }
          test_equal "jpm should be installed" \
            "${SETUP_JOLIE_OUTPUT_JPM_INSTALLED}" \
            "true"
          test_equal "jolie should not be installed" \
            "${SETUP_JOLIE_OUTPUT_JOLIE_INSTALLED}" \
            "false"
      - name: Print version
        run: jpm --version
  setup-jolie-jpm-in-container:
    name: Setup jolie & jpm in container (${{ matrix.image }}, latest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    container:
      image: ${{ matrix.image }}:latest
    strategy:
      fail-fast: false
      matrix:
        image: ["alpine", "ubuntu"]
    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v7
        with:
          persist-credentials: "false"
      - name: Setup jolie
        id: setup-jolie
        uses: ./
      - name: Test action completion
        env:
          SETUP_JOLIE_OUTPUT_JOLIE_INSTALLED: "${{ steps.setup-jolie.outputs.jolie-installed }}"
          SETUP_JOLIE_OUTPUT_JPM_INSTALLED: "${{ steps.setup-jolie.outputs.jpm-installed }}"
        run: |
          test_equal() {
            if [ "${2}" != "${3}" ]; then
              echo "::error title=${1}::Expected: ${3}. Actual: ${2}."
              exit 1
            fi
          }
          test_equal "jolie should be installed" \
            "${SETUP_JOLIE_OUTPUT_JOLIE_INSTALLED}" \
            "true"
          test_equal "jpm should be installed" \
            "${SETUP_JOLIE_OUTPUT_JPM_INSTALLED}" \
            "true"
      - name: Print version
        run: |
          jolie --version
          jpm --version
  test-jolie-jpm-installation-mode:
    name: Test jolie & jpm installation mode
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        installation-mode: ["skip", "idempotent", "always"]
    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v7
        with:
          persist-credentials: "false"
      - name: Setup jolie 1
        id: setup-jolie-1
        uses: ./
        with:
          jolie-installation-mode: "${{ matrix.installation-mode }}"
          jpm-installation-mode: "${{ matrix.installation-mode }}"
      - name: Setup jolie 2
        id: setup-jolie-2
        uses: ./
        with:
          jolie-installation-mode: "${{ matrix.installation-mode }}"
          jpm-installation-mode: "${{ matrix.installation-mode }}"
      - name: Test action completion
        env:
          SETUP_JOLIE_1_OUTPUT_JOLIE_INSTALLED: "${{ steps.setup-jolie-1.outputs.jolie-installed }}"
          SETUP_JOLIE_2_OUTPUT_JOLIE_INSTALLED: "${{ steps.setup-jolie-2.outputs.jolie-installed }}"
          SETUP_JOLIE_1_OUTPUT_JPM_INSTALLED: "${{ steps.setup-jolie-1.outputs.jpm-installed }}"
          SETUP_JOLIE_2_OUTPUT_JPM_INSTALLED: "${{ steps.setup-jolie-2.outputs.jpm-installed }}"
        run: |
          test_equal() {
            if [ "${2}" != "${3}" ]; then
              echo "::error title=${1}::Expected: ${3}. Actual: ${2}."
              exit 1
            fi
          }
          test_equal "Wrong \"jolie-installed\" output from setup-jolie-1" \
            "${SETUP_JOLIE_1_OUTPUT_JOLIE_INSTALLED}" \
            "${{ matrix.installation-mode != 'skip' }}"
          test_equal "Wrong \"jolie-installed\" output from setup-jolie-2" \
            "${SETUP_JOLIE_2_OUTPUT_JOLIE_INSTALLED}" \
            "${{ matrix.installation-mode == 'always' }}"
          test_equal "Wrong \"jpm-installed\" output from setup-jolie-1" \
            "${SETUP_JOLIE_1_OUTPUT_JPM_INSTALLED}" \
            "${{ matrix.installation-mode != 'skip' }}"
          test_equal "Wrong \"jpm-installed\" output from setup-jolie-2" \
            "${SETUP_JOLIE_2_OUTPUT_JPM_INSTALLED}" \
            "${{ matrix.installation-mode == 'always' }}"
